<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정간보 생성기</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>정간보 생성기</h1>
    <div class="header-actions">
      <button id="btn-print" type="button">인쇄 / PDF</button>
    </div>
  </header>

  <main class="app-main">
    <!-- 좌측: 설정 + 에디터 -->
    <aside class="sidebar">
      <section class="panel">
        <h2>기본 설정</h2>

        <label class="field">
          <span>종이 방향</span>
          <select id="set-orientation">
            <option value="portrait">세로 (Portrait)</option>
            <option value="landscape">가로 (Landscape)</option>
          </select>
        </label>

        <label class="field">
          <span>한 줄에 들어갈 각(장단) 수</span>
          <input id="set-gak-per-row" type="number" min="1" max="30" value="10" />
        </label>

        <label class="field">
          <span>한 각의 정간 수 (몇 박 장단)</span>
          <input id="set-jeonggan" type="number" min="1" max="40" value="6" />
        </label>

        <label class="field">
          <span>대강 구분 (정간 개수, 쉼표 구분)</span>
          <input id="set-daegang" type="text" placeholder="예: 3,2,3" value="" />
          <small>비워두면 대강 구분선 없음</small>
        </label>

        <label class="field">
          <span>페이지당 각 행(밴드) 수</span>
          <select id="set-bands">
            <option value="auto">자동 (12정간 이하 → 2행)</option>
            <option value="1">1행</option>
            <option value="2">2행</option>
            <option value="3">3행</option>
          </select>
        </label>
      </section>

      <section class="panel editor-panel">
        <h2>에디터</h2>
        <p class="hint">
          <code>|</code> 다음 정간 · <code>||</code> 다음 각(세로줄)<br />
          각은 오른쪽 → 왼쪽 순으로 배치됩니다.
        </p>
        <textarea id="editor" spellcheck="false" placeholder="예)&#10;林|姑|南|林|太|太&#10;||&#10;南|姑|林|林|太|黃"></textarea>
      </section>
    </aside>

    <!-- 우측: 미리보기 -->
    <section class="preview-wrap">
      <div id="preview" class="preview"></div>
    </section>
  </main>

  <script src="js/parser.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
